spring.application.name=sentimentapi
server.servlet.context-path=/project/api/v2
server.port=${PORT:8080}

# ML Model API (Render)
config.url=${CONFIG_URL:http://localhost:8000}

# PostgreSQL (Railway / local)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hackathonone}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# JPA
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# SQL init
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidation2024}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Error handling
server.error.include-message=always
server.error.include-stacktrace=${ERROR_STACKTRACE:never}
server.error.include-exception=false

# Gmail SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME:sentimentapi.noreply@gmail.com}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# URL del frontend para los links de recuperacion
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
